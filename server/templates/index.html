<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Load Metadata</title>
  </head>
  <body>
    <h1>Load Metadata File</h1>
    {% with messages = get_flashed_messages() %}
      {% if messages %}
        <ul>
        {% for msg in messages %}
          <li>{{ msg }}</li>
        {% endfor %}
        </ul>
      {% endif %}
    {% endwith %}

    <form method="post">
      <label for="metadata_path">Full path to metadata file (CSV or ODS):</label><br/>
      <input id="metadata_path" name="metadata_path" type="text" size="100" placeholder="e.g., C:\Users\Asus\Desktop\python_work\data\RawData\RawData\Experiments.ods" required />
      <button type="submit">Load</button>
    </form>

    <p><small>Required columns in metadata: ExpId, TribuId, DaqFile, MotorFile.</small></p>
  </body>
</html>
